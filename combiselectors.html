    <title>CombiSelector</title>
    <style>
        /*  >  symbol represents the child selector  it will change only direct child tags*/
        div >p{
            color: red;
        }
        /* space represents the desendent selector it will change for all its child tags and sibling tags */
        h4 p{
            color: blue;
        }

</head>
